spring:
  application:
    name: SocialNetwork
  datasource:
    url: jdbc:postgresql://localhost:5432/socialnetwork
    username: socialuser
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
